name: "Composite Action"
description: "Composite Action Template"
author: "Shane"

branding:
  icon: "type"
  color: "green"

# DO NOT EDIT ABOVE

inputs:
  name:
    description: "Name"
  prepare:
    description: "Prepare Script (Before Build)"
  post:
    description: "Post Script (After Build)"
  project:
    description: "Post Script (After Build)"
    default: "false"

outputs:
  version:
    description: "Version"
    value: ${{ steps.version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: "Input"
      id: input
      shell: bash
      run: |
        echo "inputs.name: ${{ inputs.name }}"

    - name: "Version"
      id: version
      shell: bash
      run: |
        echo "version=1.0.0" >> "$GITHUB_OUTPUT"

    - name: "Debug"
      id: debug
      shell: bash
      run: |
        ls ${{ inputs.project == 'false' && '-lAh' || '' }} .

    - name: "Env Var 1"
      id: test
      shell: bash
      run: |
        myvar="$(echo "ralf broke it")"
        echo "myvar: ${myvar}"
        echo "MY_ENV_VAR=${myvar}" >> $GITHUB_ENV
        echo "myvar=${myvar}" >> "$GITHUB_OUTPUT"

    - name: "Env Var 2"
      shell: bash
      run: |
        echo "MY_ENV_VAR: ${MY_ENV_VAR}"
        echo "steps.test.outputs.myvar: ${{ steps.test.outputs.myvar }}"

    - name: "Prepare"
      if: ${{ inputs.prepare }}
      shell: bash
      run: |
        ${{ inputs.prepare }}
